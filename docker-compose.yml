version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONN_EC2_AIRFLOW: 'http://admin:admin@3.34.164.128:8080'
    AIRFLOW__METRICS__STATSD_ON: 'true'
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter   # 같은 docker network면 컨테이너명
    AIRFLOW__METRICS__STATSD_PORT: 8125  
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ap-northeast-2
    ECR_REGISTRY: ${ECR_REGISTRY}
    OLIVEYOUNG_S3_BUCKET: ${OLIVEYOUNG_S3_BUCKET}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./pipelines:/opt/airflow/pipelines
    - /opt/airflow-docker:/home/airflow/.docker:ro
    - /usr/bin/docker-credential-ecr-login:/usr/local/bin/docker-credential-ecr-login:ro
    - /var/run/docker.sock:/var/run/docker.sock
  user: "0:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        /entrypoint airflow db migrate
        /entrypoint airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  statsd-exporter:
    image: prom/statsd-exporter:v0.28.0
    command: [
      "--statsd.mapping-config=/etc/statsd/mapping.yml",
      "--statsd.listen-udp=:8125"
    ]
    volumes: ["./mapping.yml:/etc/statsd/mapping.yml"]
    ports: ["9102:9102", "8125:8125/udp"]
    restart: unless-stopped
    
  node-exporter:
    image: prom/node-exporter:v1.8.2
    command: ["--path.rootfs=/host"]
    pid: host
    volumes: ["/:/host:ro,rslave"]
    ports: ["9100:9100"]
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.8.3
    env_file:
      - .env
    volumes:
      - ./logs:/opt/airflow/logs:ro
      - ./alloy-airflow.alloy:/etc/alloy/config.alloy:ro
    command: run /etc/alloy/config.alloy
    restart: always
volumes:
  postgres-db:
